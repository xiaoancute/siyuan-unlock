name: release-cron

on:
  schedule:
    - cron: "0 12 * * 2,5"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Inspect latest stable release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(gh api repos/siyuan-note/siyuan/releases/latest --jq .tag_name)"
          package_json="$(gh api "repos/siyuan-note/siyuan/contents/app/package.json?ref=${version}" -H "Accept: application/vnd.github.raw+json")"
          package_manager="$(jq -r .packageManager <<< "${package_json}")"

          if release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${version}" 2>/dev/null)"; then
            assets="$(jq -r ".assets[].name" <<< "${release_json}")"
            new_release=false
          else
            gh release create "${version}" --repo "${GITHUB_REPOSITORY}" --title "${version}" --notes "action release"
            assets=""
            new_release=true
          fi

          grep -Fxq SHA256SUMS.txt <<< "${assets}" && desktop=false || desktop=true
          grep -Eq "\.apk$" <<< "${assets}" && android=false || android=true

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_manager=${package_manager}" >> "${GITHUB_OUTPUT}"
          echo "new_release=${new_release}" >> "${GITHUB_OUTPUT}"
          echo "desktop=${desktop}" >> "${GITHUB_OUTPUT}"
          echo "android=${android}" >> "${GITHUB_OUTPUT}"

      - name: Build missing desktop assets
        if: steps.release.outputs.desktop == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run desktop-release.yml --ref "${GITHUB_REF_NAME}" -f version="${{ steps.release.outputs.version }}"

      - name: Build missing Android asset
        if: steps.release.outputs.android == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-android.yml --ref "${GITHUB_REF_NAME}" -f version="${{ steps.release.outputs.version }}" -f packageManager="${{ steps.release.outputs.package_manager }}"

      - name: Build new Docker release
        if: steps.release.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-docker.yml --ref "${GITHUB_REF_NAME}" -f version="${{ steps.release.outputs.version }}"
